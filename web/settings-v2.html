<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - 产销预测智能工作台</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
<main class="max-w-5xl mx-auto p-8">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-bold text-blue-900">系统设置</h1>
            <p class="text-slate-500 mt-1">查看当前风险阈值、上传限制和 AI 调用配置</p>
        </div>
        <button class="px-4 py-2 border rounded" onclick="location.href='dashboard-v2.html'">返回工作台</button>
    </div>
    <section class="grid gap-4" id="settingsList">
        <div class="bg-white border rounded-lg p-6 text-slate-500">加载中...</div>
    </section>
</main>
<script>
const API_BASE = 'http://localhost:8000';
function authHeaders(extra = {}) {
    const token = localStorage.getItem('accessToken');
    return token ? { ...extra, Authorization: `Bearer ${token}` } : extra;
}
window.onload = async () => {
    const response = await fetch(`${API_BASE}/api/settings`, { headers: authHeaders() });
    const data = await response.json();
    const list = document.getElementById('settingsList');
    const items = data.items || [];
    if (!items.length) {
        list.innerHTML = '<div class="bg-white border rounded-lg p-6 text-slate-500">暂无配置</div>';
        return;
    }
    list.innerHTML = items.map(item => `
        <div class="bg-white border rounded-lg p-5">
            <div class="flex justify-between gap-6">
                <div>
                    <h2 class="font-semibold">${item.key}</h2>
                    <p class="text-sm text-slate-500 mt-1">${item.description || ''}</p>
                </div>
                <div class="text-right">
                    <p class="font-mono text-blue-900">${item.value}</p>
                    <p class="text-xs text-slate-400 mt-1">${item.type || 'STRING'}</p>
                </div>
            </div>
        </div>
    `).join('');
};
</script>
</body>
</html>
