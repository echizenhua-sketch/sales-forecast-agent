<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产销预测智能工作台 - API 测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .status {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .status-card {
            flex: 1;
            min-width: 200px;
            padding: 20px;
            border-radius: 8px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
        }

        .status-card.success {
            border-left-color: #28a745;
            background: #d4edda;
        }

        .status-card.error {
            border-left-color: #dc3545;
            background: #f8d7da;
        }

        .status-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .status-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .api-section {
            margin-bottom: 30px;
        }

        .api-section h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e9ecef;
        }

        .api-test {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .api-test-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .api-endpoint {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #495057;
        }

        .method {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 8px;
        }

        .method.get {
            background: #28a745;
            color: white;
        }

        .method.post {
            background: #007bff;
            color: white;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-1px);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            background: white;
            padding: 12px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
        }

        .result.success {
            border-color: #28a745;
            background: #f0fff4;
        }

        .result.error {
            border-color: #dc3545;
            background: #fff5f5;
            color: #dc3545;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge.success {
            background: #28a745;
            color: white;
        }

        .badge.error {
            background: #dc3545;
            color: white;
        }

        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>产销预测智能工作台</h1>
        <p class="subtitle">API 功能测试界面 - v2.2.0</p>

        <div class="status">
            <div class="status-card" id="backend-status">
                <div class="status-label">后端状态</div>
                <div class="status-value">检测中...</div>
            </div>
            <div class="status-card" id="database-status">
                <div class="status-label">数据库</div>
                <div class="status-value">检测中...</div>
            </div>
            <div class="status-card" id="test-count">
                <div class="status-label">测试完成</div>
                <div class="status-value">0 / 5</div>
            </div>
        </div>

        <div class="api-section">
            <h2>核心 API 测试</h2>

            <div class="api-test">
                <div class="api-test-header">
                    <div>
                        <span class="method get">GET</span>
                        <span class="api-endpoint">/api/health</span>
                    </div>
                    <button onclick="testHealth()">测试</button>
                </div>
                <div id="health-result" class="result" style="display:none;"></div>
            </div>

            <div class="api-test">
                <div class="api-test-header">
                    <div>
                        <span class="method get">GET</span>
                        <span class="api-endpoint">/api/tasks</span>
                    </div>
                    <button onclick="testTasks()">测试</button>
                </div>
                <div id="tasks-result" class="result" style="display:none;"></div>
            </div>

            <div class="api-test">
                <div class="api-test-header">
                    <div>
                        <span class="method post">POST</span>
                        <span class="api-endpoint">/api/auth/login</span>
                    </div>
                    <button onclick="testLogin()">测试</button>
                </div>
                <div id="login-result" class="result" style="display:none;"></div>
            </div>

            <div class="api-test">
                <div class="api-test-header">
                    <div>
                        <span class="method get">GET</span>
                        <span class="api-endpoint">/</span>
                    </div>
                    <button onclick="testRoot()">测试</button>
                </div>
                <div id="root-result" class="result" style="display:none;"></div>
            </div>

            <div class="api-test">
                <div class="api-test-header">
                    <div>
                        <span class="method get">GET</span>
                        <span class="api-endpoint">/docs</span>
                    </div>
                    <button onclick="openDocs()">打开文档</button>
                </div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid #e9ecef;">
            <button onclick="runAllTests()" style="padding: 12px 32px; font-size: 16px;">
                运行所有测试
            </button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let testsPassed = 0;
        const totalTests = 5;

        async function testHealth() {
            const resultDiv = document.getElementById('health-result');
            resultDiv.style.display = 'block';
            resultDiv.textContent = '测试中...';
            resultDiv.className = 'result';

            try {
                const response = await fetch(`${API_BASE}/api/health`);
                const data = await response.json();

                resultDiv.textContent = JSON.stringify(data, null, 2);
                resultDiv.className = 'result success';

                // 更新状态卡片
                updateStatus('backend-status', '运行中', 'success');
                updateStatus('database-status', data.database || '未知', data.database === 'connected' ? 'success' : 'error');

                updateTestCount(true);
            } catch (error) {
                resultDiv.textContent = `错误: ${error.message}`;
                resultDiv.className = 'result error';
                updateStatus('backend-status', '离线', 'error');
                updateTestCount(false);
            }
        }

        async function testTasks() {
            const resultDiv = document.getElementById('tasks-result');
            resultDiv.style.display = 'block';
            resultDiv.textContent = '测试中...';
            resultDiv.className = 'result';

            try {
                const response = await fetch(`${API_BASE}/api/tasks`);
                const data = await response.json();

                resultDiv.textContent = `返回 ${data.length} 个任务\n\n` + JSON.stringify(data, null, 2);
                resultDiv.className = 'result success';
                updateTestCount(true);
            } catch (error) {
                resultDiv.textContent = `错误: ${error.message}`;
                resultDiv.className = 'result error';
                updateTestCount(false);
            }
        }

        async function testLogin() {
            const resultDiv = document.getElementById('login-result');
            resultDiv.style.display = 'block';
            resultDiv.textContent = '测试中...';
            resultDiv.className = 'result';

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'test',
                        password: 'wrong'
                    })
                });

                const data = await response.json();

                if (response.status === 401 || response.status === 422) {
                    resultDiv.textContent = `预期行为: ${response.status}\n\n` + JSON.stringify(data, null, 2);
                    resultDiv.className = 'result success';
                    updateTestCount(true);
                } else {
                    resultDiv.textContent = JSON.stringify(data, null, 2);
                    resultDiv.className = 'result';
                    updateTestCount(true);
                }
            } catch (error) {
                resultDiv.textContent = `错误: ${error.message}`;
                resultDiv.className = 'result error';
                updateTestCount(false);
            }
        }

        async function testRoot() {
            const resultDiv = document.getElementById('root-result');
            resultDiv.style.display = 'block';
            resultDiv.textContent = '测试中...';
            resultDiv.className = 'result';

            try {
                const response = await fetch(`${API_BASE}/`);
                const data = await response.json();

                resultDiv.textContent = JSON.stringify(data, null, 2);
                resultDiv.className = 'result success';
                updateTestCount(true);
            } catch (error) {
                resultDiv.textContent = `错误: ${error.message}`;
                resultDiv.className = 'result error';
                updateTestCount(false);
            }
        }

        function openDocs() {
            window.open(`${API_BASE}/docs`, '_blank');
            updateTestCount(true);
        }

        async function runAllTests() {
            testsPassed = 0;
            updateTestCount(false, true);

            await testHealth();
            await new Promise(r => setTimeout(r, 500));

            await testRoot();
            await new Promise(r => setTimeout(r, 500));

            await testTasks();
            await new Promise(r => setTimeout(r, 500));

            await testLogin();
            await new Promise(r => setTimeout(r, 500));

            openDocs();
        }

        function updateStatus(cardId, value, type) {
            const card = document.getElementById(cardId);
            card.querySelector('.status-value').textContent = value;

            if (type === 'success') {
                card.classList.add('success');
                card.classList.remove('error');
            } else if (type === 'error') {
                card.classList.add('error');
                card.classList.remove('success');
            }
        }

        function updateTestCount(success, reset = false) {
            if (reset) testsPassed = 0;
            if (success) testsPassed++;

            const countCard = document.getElementById('test-count');
            countCard.querySelector('.status-value').textContent = `${testsPassed} / ${totalTests}`;

            if (testsPassed === totalTests) {
                countCard.classList.add('success');
            }
        }

        // 页面加载时自动测试健康检查
        window.onload = () => {
            testHealth();
        };
    </script>
</body>
</html>
